<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }
      
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
      }
      
      .login-container {
        background: #fff;
        padding: 35px;
        width: 380px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      
      .login-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }
      
      .form-group {
        margin-bottom: 18px;
      }
      
      .form-group label {
        display: block;
        margin-bottom: 6px;
        color: #555;
        font-weight: bold;
      }
      
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        transition: 0.3s;
      }
      
      .form-group input:focus {
        border-color: #4f46e5;
      }
      
      .login-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #4f46e5;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }
      
      .login-btn:hover {
        background: #4338ca;
      }
      
      .extra-links {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
        font-size: 14px;
      }
      
      .extra-links a {
        color: #4f46e5;
        text-decoration: none;
      }
      
      .extra-links a:hover {
        text-decoration: underline;
      }
      
      .signup-link {
        text-align: center;
        margin-top: 20px;
      }
      
      .signup-link a {
        color: #4f46e5;
        text-decoration: none;
        font-weight: bold;
      }
      
      .signup-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <h2>Login</h2>

      <form action="#" method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter your Username" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <div class="extra-links">
        <a href="#">Forgot Password?</a>
        <a href="{% url 'signup_view' %}">Sign Up</a>
      </div>

      <div class="signup-link">
        Don't have an account?
        <a href="{% url 'signup_view' %}">Create Account</a>
      </div>
    </div>
  </body>
</html>
