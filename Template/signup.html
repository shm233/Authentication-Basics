<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }
      
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
      }
      
      .signup-container {
        background: white;
        padding: 35px;
        border-radius: 12px;
        width: 380px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      
      .signup-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }
      
      .form-group {
        margin-bottom: 15px;
      }
      
      .form-group label {
        display: block;
        margin-bottom: 6px;
        color: #555;
        font-weight: bold;
      }
      
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        transition: 0.3s;
      }
      
      .form-group input:focus {
        border-color: #4f46e5;
      }
      
      .signup-btn {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }
      
      .signup-btn:hover {
        background: #4338ca;
      }
      
      .login-link {
        text-align: center;
        margin-top: 15px;
      }
      
      .login-link a {
        color: #4f46e5;
        text-decoration: none;
      }
      
      .login-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="signup-container">
      <h2>Create Account</h2>

      <form action="#" method="POST">
        {% csrf_token %}
        
        <div class="form-group">
          <label>User Name</label>
          <input type="text" name="username" placeholder="Enter your user name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label>City</label>
          <input type="text" name="city" placeholder="Enter your City" required />
        </div>

        <div class="form-group">
          <label>Reg No.</label>
          <input type="number" name="reg_number" placeholder="Enter your registration number" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Create a password" required />
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="password2" placeholder="Confirm your password" required />
        </div>

        <button type="submit" class="signup-btn">Sign Up</button>
      </form>

      <div class="login-link">
        Already have an account?
        <a href="{% url 'login_view' %}">Login</a>
      </div>
    </div>
  </body>
</html>
